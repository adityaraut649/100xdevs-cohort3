<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            width: 1200px;
            margin: 0 auto;
            background-color: red;
        }

        .content {
            height: 500px;
            width: 1200px;
            background-color: red;
        }

        .vertical {
          display: flex;
          justify-content: center; 
          align-items: center;
          height: 100%;
        } 

        .Horizontal {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
         <div class="content">
            <div class="vertical">
                <div class="Horizontal">
                     <h1>Hello</h1>
                </div>
            </div>
         </div>
    </div>
</body>
</html>
