<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 10px;
      }
      .left {
        background-color: red;
      }
      .right {
        background-color: blue;
      }
      .col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="left">
        <div class="left-tp">
          <h1>Hello</h1>
        </div>
        <div class="left-bt">
          <p>HI MY NAME IS HARKIRAT</p>
        </div>
      </div>
      <div class="right">
        <div class="col">
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
          <h1>Hello</h1>
        </div>
      </div>
    </div>
  </body>
</html>
